# Define os serviços que compõe a aplicação (app e db)
services:

  app:
    build: . # O "." indica que o Dockerfile está no mesmo diretório do docker-compose.yml (atual)
    command: /bin/sh -c "npm install && npm start" # Comando para instalar as dependências e iniciar a aplicação
    ports:
      - "5000:5000" # Mapeia a porta 5000 do container para a porta 5000 da máquina host
    volumes:
      - .:/usr/app # Monta o diretório atual para o diretório /usr/app dentro do container, permitindo que as mudanças sejam refletidas em tempo real
    depends_on:
      - db # Indica que o serviço "app" depende do serviço "db", garantindo que o banco de dados seja iniciado antes da aplicação

  db:
    image: mysql:5.7 # Usa a imagem oficial do MySQL versão 5.7
    restart: always # Configura o container para reiniciar automaticamente em caso de falha
    environment:
      MYSQL_ROOT_PASSWORD: root # Define a senha do usuário root do MySQL
      MYSQL_DATABASE: vio_Ana # Define o nome do banco de dados a ser criado
    ports: 
      - "3307:3307" # Mapeia a porta 3306 do container para a porta 3306 da máquina host, permitindo acesso ao banco de dados
    volumes:
      - db_data:/var/lib/mysql # Monta um volume para persistir os dados do banco de dados, garantindo que os dados não sejam perdidos quando o container for reiniciado
      - ./mysql-init:/docker-entrypoint-initdb.d # Monta o diretório local "mysql-init" para o diretório "/docker-entrypoint-initdb.d" do container, permitindo a execução de scripts SQL de inicialização


volumes:
  db_data: # Define um volume nomeado para armazenar os dados do banco de dados, garantindo persistência mesmo que o container seja removido

## Comandos: 
docker ps -a # Lista todos os containers, incluindo os que estão parados
docker exec -it sistemavio_2026_api-db-1 mysql -u root -p # Acessa o terminal do MySQL dentro do container, usando o usuário root e solicitando a senha
